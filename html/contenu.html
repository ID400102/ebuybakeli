<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/contenu.css">
    <title>Document</title>
</head>

<body>
    <main>
        <section class="content-management">
            <h2>Contenus Actuels</h2>
            <table border="2">
                <thead>
                    <tr>
                        <th>Numéro</th>
                        <th>Type</th>
                        <th>Titre</th>
                        <th>Statut</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td>1</td>
                        <td>Bannière</td>
                        <td>Promo Fin d'anné</td>
                        <td>Actif</td>
                        <td>
                            <button class="edit">Modifier</button>
                            <button class="approve">Valider</button>
                            <button class="delete">Supprimer</button>
                        </td>
                    </tr>
                    <tr>
                        <td>2</td>
                        <td>Vidéo</td>
                        <td>Présentation Nouveaux Produits</td>
                        <td>En attente</td>
                        <td>
                            <button class="edit">Modifier</button>
                            <button class="approve">Valider</button>
                            <button class="delete">Supprimer</button>
                        </td>
                    </tr>
                    <tr>
                        <td>3</td>
                        <td>Mise en avant</td>
                        <td>Chaussur</td>
                        <td>Actif</td>
                        <td>
                            <button class="edit">Modifier</button>
                            <button class="approve">Valider</button>
                            <button class="delete">Supprimer</button>
                        </td>
                    </tr>
                </tbody>
            </table>

            <h2>Ajouter un Nouveau Contenu</h2>
            <form class="contenu0">
                <label for="type" class="Contenu1">Type :</label>
                <select id="type" name="type" required>
                    <option value="banniere">Bannière</option>
                    <option value="video">Vidéo</option>
                    <option value="mise-en-avant">Mise en avant</option>
                </select>
                <br>
                <br>
                <label for="title" class="Contenu1">Titre :</label>
                <input type="text" id="title" name="title" required>
                <br>
                <br>
                <label for="file" class="Contenu1">Fichier/URL :</label>
                <input type="text" id="file" name="file" placeholder="Lien ou fichier">
                <br>
                <br>
                <button type="submit" class="add">Ajouter</button>
            </form>
        </section>
    </main>
</body>

</html>
