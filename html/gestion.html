<!DOCTYPE html>
<html lang="en">

<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

</head>

<body>
    <div class="gestion00">
        <h2>Liste des Catégories</h2>
        <table border="2">
            <thead>
                <tr>
                    <th>Numéro</th>
                    <th>Nom de la Catégorie</th>
                    <th>Description</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>1</td>
                    <td>Mode</td>
                    <td>Chaussures de luxe</td>
                    <td>
                        <button class="edit">Modifier</button>
                        <button class="delete">Supprimer</button>
                    </td>
                </tr>
                <tr>
                    <td>2</td>
                    <td>Mode</td>
                    <td>Vêtements de sport</td>
                    <td>
                        <button class="edit">Modifier</button>
                        <button class="delete">Supprimer</button>
                    </td>
                </tr>
                <tr>
                    <td>3</td>
                    <td>Mode</td>
                    <td>Montre de luxe</td>
                    <td>
                        <button class="edit">Modifier</button>
                        <button class="delete">Supprimer</button>
                    </td>
                </tr>
            </tbody>
        </table>

        <h2>Ajouter une Nouvelle Catégorie</h2>
        <form class="gestion0">
            <label for="name" class="gestion1">Nom :</label>
            <input type="text" id="name" name="name" required>
            <br>
            <br>
            <label for="description" class="gestion1">Description :</label>
            <textarea id="description" name="description" required></textarea>
            <br>
            <br>
            <button type="submit" class="gestion1">Ajouter</button>
        </form>
    </div>
